# Configuration for training LST-MADNet with Early Fusion (EF)
# All channels are concatenated along the time axis, then passed to a single LSTN

data:
  data_dir: "data/splitted/"

training:
  batch_size: 16
  n_epochs: 35
  lr: 1.0e-3
  clip_grad: true
  device: "cuda"
  logging_interval: 5

model:
  # Total signal size = sum of all channel lengths after per-channel normalization & concat
  # intrinsic (4 channels * 1408) + task (7 channels * 463) + extrinsic (1 * 34816) = 43689
  signal_size: 43689
  batch_norm: true
  stlayer_config:
    scale_min: 0.1
    scale_max: 10.0
    num_scales: 16
    kernel_ratio: 0.1
    stride_ratio: 0.5
    kernel_ratio_lp: 0.1
    stride_ratio_lp: 0.5
  conv1_config:
    out_channels: 6
    kernel_ratio: [0.5, 0.2]
    stride_ratio: [0.5, 0.5]
  pool1_config:
    kernel_ratio: [0.5, 0.5]
    stride_ratio: [0.5, 0.5]
  conv2_config:
    out_channels: 16
    kernel_ratio: [0.5, 0.2]
    stride_ratio: [0.5, 0.5]
  pool2_config:
    kernel_ratio: [0.5, 0.5]
    stride_ratio: [0.5, 0.5]
  linear_config:
    hidden1_ratio: 0.5
    hidden2_ratio: 0.5
    num_classes: 4

wandb:
  enabled: false
  project_name: "LST-MADNet-EF"

checkpoints:
  dir: "checkpoints/"
